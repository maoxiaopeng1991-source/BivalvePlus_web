name: Update Genetic Resources Data

on:
  schedule:
    - cron: '0 6 * * MON'  # Every Monday at 06:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run data collection script
        run: python scripts/collect_genetic_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/genetic-*.json
          git diff --staged --quiet || git commit -m "chore: update genetic resources data"
          git push
